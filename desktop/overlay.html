<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:90px; height:90px;
  background:#121212;
  overflow:hidden;
  font-family:-apple-system,"Segoe UI",sans-serif;
  -webkit-user-select:none;
  user-select:none;
  -webkit-app-region:drag;
}
#circle {
  width:90px; height:90px;
  border-radius:50%;
  background:#121212;
  border:3px solid #c2622b;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:1px;
  cursor:pointer;
  -webkit-app-region:no-drag;
}
.ph { font-size:8px; font-weight:800; letter-spacing:2px; color:#c2622b; text-transform:uppercase; }
.tm { font-size:17px; font-weight:700; color:#fff; letter-spacing:-1px; font-variant-numeric:tabular-nums; }
.dot { width:5px; height:5px; border-radius:50%; background:#c2622b; opacity:0; transition:opacity .3s; }
.dot.on { opacity:1; animation:blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
</style>
</head>
<body>
<div id="circle" onclick="tog()">
  <span class="ph" id="ph">FOCUS</span>
  <span class="tm" id="tm">25:00</span>
  <div  class="dot" id="dot"></div>
</div>
<script>
const D={focus:1500,shortBreak:300,longBreak:900};
const C={focus:'#c2622b',shortBreak:'#0d9488',longBreak:'#7c3aed'};
const L={focus:'FOCUS',shortBreak:'BREAK',longBreak:'LONG'};
const S=['focus','shortBreak','focus','shortBreak','focus','shortBreak','focus','longBreak'];
let i=0,ph='focus',s=D.focus,run=false,iv=null;
function fmt(x){return String(Math.floor(x/60)).padStart(2,'0')+':'+String(x%60).padStart(2,'0');}
function draw(){
  document.getElementById('ph').textContent=L[ph];
  document.getElementById('ph').style.color=C[ph];
  document.getElementById('circle').style.borderColor=C[ph];
  document.getElementById('dot').style.background=C[ph];
  document.getElementById('tm').textContent=fmt(s);
  document.getElementById('dot').className='dot'+(run?' on':'');
}
function tick(){if(s>0)s--;else{i=(i+1)%S.length;ph=S[i];s=D[ph];}draw();}
function tog(){run=!run;if(run)iv=setInterval(tick,1000);else{clearInterval(iv);iv=null;}draw();}
draw();
</script>
</body>
</html>
