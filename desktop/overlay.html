<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #0d0d0d;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
    -webkit-app-region: drag;
    user-select: none;
  }

  /* The circle fills the entire 90×90 window */
  #circle {
    width: 90px; height: 90px;
    border-radius: 50%;
    background: #121212;
    border: 3px solid var(--c, #c2622b);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
  }

  .phase {
    font-size: 8px; font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--c, #c2622b);
    -webkit-app-region: no-drag;
  }
  .time {
    font-size: 15px; font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.5px;
    font-variant-numeric: tabular-nums;
    -webkit-app-region: no-drag;
  }
  .dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--c, #c2622b);
    margin-top: 3px;
    opacity: 0;
    transition: opacity 0.3s;
    -webkit-app-region: no-drag;
  }
  .dot.running { opacity: 1; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>

<div id="circle" onclick="toggleTimer()">
  <span class="phase" id="phase-label">FOCUS</span>
  <span class="time"  id="time-display">25:00</span>
  <div class="dot"    id="dot"></div>
</div>

<script>
  const DURATIONS = { focus: 25*60, shortBreak: 5*60, longBreak: 15*60 };
  const COLORS    = { focus:'#c2622b', shortBreak:'#0d9488', longBreak:'#7c3aed' };
  const LABELS    = { focus:'FOCUS', shortBreak:'BREAK', longBreak:'LONG' };
  const ORDER     = ['focus','shortBreak','focus','shortBreak',
                     'focus','shortBreak','focus','longBreak'];

  let idx = 0, phase = 'focus', secs = DURATIONS.focus;
  let running = false, timer = null;

  function fmt(s) {
    return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
  }

  function render() {
    document.documentElement.style.setProperty('--c', COLORS[phase]);
    document.getElementById('phase-label').textContent   = LABELS[phase];
    document.getElementById('time-display').textContent  = fmt(secs);
    document.getElementById('dot').className = 'dot' + (running ? ' running' : '');
  }

  function tick() {
    if (secs > 0) { secs--; }
    else {
      idx = (idx + 1) % ORDER.length;
      phase = ORDER[idx]; secs = DURATIONS[phase];
    }
    render();
  }

  function toggleTimer() {
    running = !running;
    if (running) timer = setInterval(tick, 1000);
    else { clearInterval(timer); timer = null; }
    render();
  }

  render();
</script>
</body>
</html>
